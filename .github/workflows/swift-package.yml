name: Build and Test

on:
  workflow_call:
    inputs:
      run_linux_tests:
        type: boolean
        default: false
      linux_runners:
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  setup:
    name: Setup
    runs-on: macos-latest
    outputs:
      package_name: ${{ steps.parse.outputs.package_name }}
      platform_matrix: ${{ steps.parse.outputs.platform_matrix }}
      has_ui_tests: ${{ steps.parse.outputs.has_ui_tests }}
      ui_scheme: ${{ steps.parse.outputs.ui_scheme }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse package manifest
        id: parse
        run: |
          DUMP=$(swift package dump-package)

          PACKAGE_NAME=$(echo "$DUMP" | jq -r '.name')
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

          PLATFORM_MATRIX=$(echo "$DUMP" | jq -c '
            [.platforms[].platformName |
              if . == "ios" then
                {"name": "iOS", "destination": "platform=iOS Simulator,name=iPhone 17 Pro"}
              elif . == "macos" then
                {"name": "macOS", "destination": "platform=macOS,arch=arm64"}
              elif . == "maccatalyst" then
                {"name": "Mac Catalyst", "destination": "platform=macOS,arch=arm64,variant=Mac Catalyst"}
              elif . == "watchos" then
                {"name": "watchOS", "destination": "platform=watchOS Simulator,name=Apple Watch Series 11 (46mm)"}
              elif . == "visionos" then
                {"name": "visionOS", "destination": "platform=visionOS Simulator,name=Apple Vision Pro"}
              elif . == "tvos" then
                {"name": "tvOS", "destination": "platform=tvOS Simulator,name=Apple TV 4K (3rd generation)"}
              else
                empty
              end
            ]
          ')
          echo "platform_matrix=$PLATFORM_MATRIX" >> "$GITHUB_OUTPUT"

          if [ -d "Tests/UITests" ]; then
            echo "has_ui_tests=true" >> "$GITHUB_OUTPUT"
            UI_SCHEME=$(find Tests/UITests -name "*.xcscheme" | xargs -I{} basename {} .xcscheme | sort | head -1)
            echo "ui_scheme=$UI_SCHEME" >> "$GITHUB_OUTPUT"
          else
            echo "has_ui_tests=false" >> "$GITHUB_OUTPUT"
            echo "ui_scheme=" >> "$GITHUB_OUTPUT"
          fi

  package_tests:
    name: Build and Test Swift Package ${{ matrix.platform.name }} (${{ matrix.config }})
    needs: setup
    uses: StanfordBDHG/.github/.github/workflows/xcodebuild-or-fastlane.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
        platform: ${{ fromJSON(needs.setup.outputs.platform_matrix) }}
      fail-fast: false
    with:
      runsonlabels: '["macOS", "self-hosted"]'
      scheme: ${{ format('{0}-Package', needs.setup.outputs.package_name) }}
      destination: ${{ matrix.platform.destination }}
      buildConfig: ${{ matrix.config }}
      resultBundle: ${{ format('{0}-{1}-{2}.xcresult', needs.setup.outputs.package_name, matrix.platform.name, matrix.config) }}
      artifactname: ${{ format('{0}-{1}-{2}.xcresult', needs.setup.outputs.package_name, matrix.platform.name, matrix.config) }}

  ui_tests:
    name: Build and Test UI Tests ${{ matrix.platform.name }} (${{ matrix.config }})
    needs: setup
    if: needs.setup.outputs.has_ui_tests == 'true'
    uses: StanfordBDHG/.github/.github/workflows/xcodebuild-or-fastlane.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
        platform:
          - name: iOS
            destination: 'platform=iOS Simulator,name=iPhone 17 Pro Max'
      fail-fast: false
    with:
      runsonlabels: '["macOS", "self-hosted"]'
      path: 'Tests/UITests'
      scheme: ${{ needs.setup.outputs.ui_scheme }}
      destination: ${{ matrix.platform.destination }}
      buildConfig: ${{ matrix.config }}
      resultBundle: ${{ format('{0}-{1}-{2}.xcresult', needs.setup.outputs.ui_scheme, matrix.platform.name, matrix.config) }}
      artifactname: ${{ format('{0}-{1}-{2}.xcresult', needs.setup.outputs.ui_scheme, matrix.platform.name, matrix.config) }}

  package_tests_linux:
    name: Build and Test Swift Package Linux (${{ matrix.config }})
    needs: setup
    if: inputs.run_linux_tests
    uses: StanfordBDHG/.github/.github/workflows/swift-test.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
      fail-fast: false
    with:
      runs_on_labels: ${{ inputs.linux_runners }}
      test_flags: '--no-parallel'
      build_configuration: ${{ matrix.config }}
      artifact_name: ${{ format('{0}-Package-Linux-{1}.lcov', needs.setup.outputs.package_name, matrix.config) }}

  uploadcoveragereport:
    name: Upload Coverage Report
    needs: [setup, package_tests, ui_tests, package_tests_linux]
    if: always() && !cancelled() && !failure()
    uses: StanfordBDHG/.github/.github/workflows/create-and-upload-coverage-report.yml@v2
    with:
      coveragereports: ${{ format('{0}-*.xcresult {1}-*.xcresult', needs.setup.outputs.package_name, needs.setup.outputs.ui_scheme) }}
      coveragereports_lcov: ${{ inputs.run_linux_tests && format('{0}-Package-Linux-*.lcov', needs.setup.outputs.package_name) || '' }}
    secrets:
      token: ${{ secrets.CODECOV_TOKEN }}

