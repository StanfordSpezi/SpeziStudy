name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/spezi-setup.yml

  build_and_test:
    needs: setup
    uses: ./.github/workflows/spezi-package-test.yml
    with:
      package_name: ${{ needs.setup.outputs.package_name }}
      platform_matrix: ${{ needs.setup.outputs.platform_matrix }}
      ui_scheme: ${{ needs.setup.outputs.ui_scheme }}
      linux_run_tests: true
      linux_runners: '["blacksmith-4vcpu-ubuntu-2404"]'
    secrets: inherit

  static_analysis:
    needs: setup
    uses: ./.github/workflows/spezi-static-analysis.yml
    with:
      library_products: ${{ needs.setup.outputs.library_products }}
      platform_name: ${{ needs.setup.outputs.platform_name }}
      platform_version: ${{ needs.setup.outputs.platform_version }}
